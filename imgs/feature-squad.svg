<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d6cb4"/>
      <stop offset="50%" stop-color="#4a9bd9"/>
      <stop offset="100%" stop-color="#6bb8e8"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f8fbfe"/>
    </linearGradient>
    <filter id="s2" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0a1a2e" flood-opacity="0.1"/>
    </filter>
    <filter id="ps2" x="-15%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0a1a2e" flood-opacity="0.18"/>
    </filter>
    <clipPath id="sc2">
      <rect x="12" y="12" width="176" height="376" rx="16"/>
    </clipPath>
  </defs>

  <g filter="url(#ps2)">
    <rect x="3" y="3" width="194" height="394" rx="28" fill="#1a1a1a"/>
    <rect x="6" y="6" width="188" height="388" rx="25" fill="#2a2a2a"/>
    <rect x="9" y="9" width="182" height="382" rx="22" fill="#1a1a1a"/>
  </g>

  <g clip-path="url(#sc2)">
    <rect x="12" y="12" width="176" height="376" fill="#f5f9fd"/>

    <rect x="12" y="12" width="176" height="44" fill="#f5f9fd"/>
    <rect x="72" y="18" width="56" height="18" rx="9" fill="#1a1a1a"/>

    <!-- Header -->
    <rect x="12" y="56" width="176" height="52" fill="#f5f9fd"/>
    <text x="28" y="82" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="800" fill="#0a1a2e">Squad Match</text>
    <text x="150" y="80" font-family="Arial" font-size="16">&#x1F91D;</text>

    <!-- Avatars with match -->
    <g transform="translate(100, 140)">
      <!-- Avatar 1 -->
      <circle cx="-24" cy="0" r="28" fill="#deeaf5" stroke="#fff" stroke-width="3"/>
      <text x="-24" y="5" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="800" fill="#3a87c8">A</text>

      <!-- Avatar 2 -->
      <circle cx="24" cy="0" r="28" fill="#deeaf5" stroke="#fff" stroke-width="3"/>
      <text x="24" y="5" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="800" fill="#6bb8e8">M</text>

      <!-- Heart between -->
      <circle cx="0" cy="0" r="14" fill="url(#bg2)"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff">&#x2764;</text>
    </g>

    <!-- Match percentage -->
    <g transform="translate(100, 188)">
      <rect x="-36" y="0" width="72" height="24" rx="12" fill="url(#bg2)"/>
      <text x="0" y="16" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">87% Match</text>
    </g>

    <!-- Shared Preferences -->
    <text x="28" y="236" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="700" fill="#5a7089" letter-spacing="0.05em">SHARED PREFERENCES</text>

    <!-- Preference chips -->
    <g filter="url(#s2)">
      <rect x="20" y="248" width="74" height="32" rx="16" fill="#fff"/>
      <text x="36" y="268" font-family="Arial" font-size="12">&#x1F35C;</text>
      <text x="50" y="268" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#0a1a2e">Ramen</text>
    </g>
    <g filter="url(#s2)">
      <rect x="102" y="248" width="76" height="32" rx="16" fill="#fff"/>
      <text x="118" y="268" font-family="Arial" font-size="12">&#x1F363;</text>
      <text x="132" y="268" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#0a1a2e">Sushi</text>
    </g>
    <g filter="url(#s2)">
      <rect x="20" y="288" width="68" height="32" rx="16" fill="#fff"/>
      <text x="36" y="308" font-family="Arial" font-size="12">&#x1F355;</text>
      <text x="50" y="308" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#0a1a2e">Pizza</text>
    </g>
    <g filter="url(#s2)">
      <rect x="96" y="288" width="82" height="32" rx="16" fill="#fff"/>
      <text x="112" y="308" font-family="Arial" font-size="12">&#x1F32E;</text>
      <text x="126" y="308" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#0a1a2e">Mexican</text>
    </g>

    <!-- CTA Button -->
    <rect x="28" y="340" width="144" height="36" rx="18" fill="url(#bg2)"/>
    <text x="100" y="362" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">Start Matching</text>

    <rect x="72" y="382" width="56" height="4" rx="2" fill="#0a1a2e" opacity="0.15"/>
  </g>

  <rect x="9" y="9" width="182" height="382" rx="22" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
</svg>
