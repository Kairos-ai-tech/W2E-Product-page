<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d6cb4"/>
      <stop offset="50%" stop-color="#4a9bd9"/>
      <stop offset="100%" stop-color="#6bb8e8"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f8fbfe"/>
    </linearGradient>
    <filter id="s1" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0a1a2e" flood-opacity="0.1"/>
    </filter>
    <filter id="ps" x="-15%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0a1a2e" flood-opacity="0.18"/>
    </filter>
    <clipPath id="sc">
      <rect x="12" y="12" width="176" height="376" rx="16"/>
    </clipPath>
  </defs>

  <g filter="url(#ps)">
    <rect x="3" y="3" width="194" height="394" rx="28" fill="#1a1a1a"/>
    <rect x="6" y="6" width="188" height="388" rx="25" fill="#2a2a2a"/>
    <rect x="9" y="9" width="182" height="382" rx="22" fill="#1a1a1a"/>
  </g>

  <g clip-path="url(#sc)">
    <rect x="12" y="12" width="176" height="376" fill="#f5f9fd"/>

    <rect x="12" y="12" width="176" height="44" fill="#f5f9fd"/>
    <rect x="72" y="18" width="56" height="18" rx="9" fill="#1a1a1a"/>

    <!-- Header -->
    <rect x="12" y="56" width="176" height="52" fill="#f5f9fd"/>
    <text x="28" y="82" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="800" fill="#0a1a2e">AI Picks for You</text>
    <text x="160" y="80" font-family="Arial" font-size="16">&#x2728;</text>

    <!-- AI Bubble -->
    <g filter="url(#s1)">
      <rect x="20" y="106" width="160" height="56" rx="14" fill="url(#bg)"/>
      <text x="36" y="126" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#fff" opacity="0.9">Based on your taste profile</text>
      <text x="36" y="142" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#fff">3 personalized picks nearby</text>
      <text x="158" y="134" font-family="Arial" font-size="18">&#x1F916;</text>
    </g>

    <!-- Restaurant Card 1 -->
    <g filter="url(#s1)">
      <rect x="20" y="176" width="160" height="56" rx="12" fill="url(#card)"/>
      <rect x="28" y="184" width="40" height="40" rx="8" fill="#deeaf5"/>
      <text x="48" y="210" text-anchor="middle" font-family="Arial" font-size="18">&#x1F35C;</text>
      <text x="76" y="198" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#0a1a2e">Tonkotsu Lab</text>
      <text x="76" y="212" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5a7089">Japanese Ramen</text>
      <rect x="76" y="218" width="34" height="12" rx="6" fill="#eaf2fd"/>
      <text x="93" y="227" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="7" fill="#3a87c8" font-weight="600">98%</text>
      <text x="120" y="227" font-family="Arial" font-size="9" fill="#6bb8e8">&#x2605;</text>
      <text x="130" y="227" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" font-weight="600" fill="#0a1a2e">4.8</text>
    </g>

    <!-- Restaurant Card 2 -->
    <g filter="url(#s1)">
      <rect x="20" y="244" width="160" height="56" rx="12" fill="url(#card)"/>
      <rect x="28" y="252" width="40" height="40" rx="8" fill="#deeaf5"/>
      <text x="48" y="278" text-anchor="middle" font-family="Arial" font-size="18">&#x1F355;</text>
      <text x="76" y="266" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#0a1a2e">Roma Pizzeria</text>
      <text x="76" y="280" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5a7089">Italian Pizza</text>
      <rect x="76" y="286" width="34" height="12" rx="6" fill="#eaf2fd"/>
      <text x="93" y="295" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="7" fill="#3a87c8" font-weight="600">94%</text>
      <text x="120" y="295" font-family="Arial" font-size="9" fill="#6bb8e8">&#x2605;</text>
      <text x="130" y="295" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" font-weight="600" fill="#0a1a2e">4.6</text>
    </g>

    <!-- Restaurant Card 3 -->
    <g filter="url(#s1)">
      <rect x="20" y="312" width="160" height="56" rx="12" fill="url(#card)"/>
      <rect x="28" y="320" width="40" height="40" rx="8" fill="#deeaf5"/>
      <text x="48" y="346" text-anchor="middle" font-family="Arial" font-size="18">&#x1F363;</text>
      <text x="76" y="334" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#0a1a2e">Sushi Zen</text>
      <text x="76" y="348" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5a7089">Japanese Sushi</text>
      <rect x="76" y="354" width="34" height="12" rx="6" fill="#eaf2fd"/>
      <text x="93" y="363" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="7" fill="#3a87c8" font-weight="600">91%</text>
      <text x="120" y="363" font-family="Arial" font-size="9" fill="#6bb8e8">&#x2605;</text>
      <text x="130" y="363" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" font-weight="600" fill="#0a1a2e">4.5</text>
    </g>

    <rect x="72" y="382" width="56" height="4" rx="2" fill="#0a1a2e" opacity="0.15"/>
  </g>

  <rect x="9" y="9" width="182" height="382" rx="22" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
</svg>
