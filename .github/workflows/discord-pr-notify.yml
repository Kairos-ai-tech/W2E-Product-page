name: Discord PR Notification

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_review' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE_REVIEW: ${{ github.event.pull_request.title }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          REVIEW_URL: ${{ github.event.review.html_url }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            TITLE="PR Review: ${PR_TITLE_REVIEW}"
            BODY="${REVIEW_STATE} by ${REVIEW_USER}"
            URL="${REVIEW_URL}"
            COLOR=5763719
          elif [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            TITLE="PR Comment: ${PR_TITLE_REVIEW}"
            BODY="Comment by ${COMMENT_USER}"
            URL="${COMMENT_URL}"
            COLOR=3447003
          else
            TITLE="PR Comment: ${ISSUE_TITLE}"
            BODY="Comment by ${COMMENT_USER}"
            URL="${COMMENT_URL}"
            COLOR=3447003
          fi

          # Use jq to safely build JSON payload (prevents injection)
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg url "$URL" \
            --argjson color "$COLOR" \
            '{embeds: [{title: $title, description: $body, url: $url, color: $color}]}')

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
